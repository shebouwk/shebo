<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اعتذار لملاكي</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
            /* تم وضع رابط صورتك هنا */
            background: url('https://i.ibb.co/fdzJmcYP/download-15.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; touch-action: none;
        }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }
        
        .card { 
            position: relative; background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 25px; text-align: center; 
            width: 85%; max-width: 400px; z-index: 10; backdrop-filter: blur(10px); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        h1 { color: #d90429; font-size: 1.8rem; margin: 0 0 15px 0; }
        p { color: #333; font-size: 1.1rem; line-height: 1.7; margin-bottom: 30px; font-weight: 600; }

        .btn-container {
            display: flex; justify-content: center; align-items: center;
            gap: 15px; position: relative; width: 100%; height: 60px;
        }

        .btn-yes { 
            background: linear-gradient(45deg, #ef233c, #d90429);
            color: white; border: none; padding: 12px 25px; 
            font-size: 1.1rem; border-radius: 50px; cursor: pointer; 
            font-weight: bold; z-index: 11; min-width: 110px;
        }

        .btn-no { 
            background: #6c757d; color: white; border: none; 
            padding: 12px 20px; font-size: 1.1rem; border-radius: 50px; 
            cursor: pointer; font-weight: bold; transition: all 0.2s ease;
            z-index: 999; min-width: 110px; white-space: nowrap;
            position: relative; 
        }

        #success { display: none; }
        .particle { position: fixed; pointer-events: none; z-index: 1000; animation: fly 2.5s ease-out forwards; }
        @keyframes fly { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-120vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="card">
        <div id="ask">
            <div style="font-size: 3rem; margin-bottom: 10px;">🥺</div>
            <h1>أنا آسف.. ❤️</h1>
            <p>اسف على اى حاجه وحشه عملتها وزعلتك حتى لو صغيره انا مقدرش اعيش من غيرك يا ملاكى اتمنى تقبلى اعتزارى</p>
            <div class="btn-container">
                <button class="btn-yes" onclick="celebrate()">سامحتك ❤️</button>
                <button class="btn-no" id="noBtn">مش مسامحة 😤</button>
            </div>
        </div>

        <div id="success">
            <div style="font-size: 4.5rem; margin-bottom: 10px;">💋✨🫂</div>
            <h1 style="color: #2a9d8f;">وييييي 🥳</h1>
            <p>كنت عارف انك هتسامحينى عشان انتى اجمل وارق بنوته فى الدنيا كلها بحبك اويييي مووواااه 💋💋💋 🫂🫂🫂</p>
        </div>
    </div>

    <audio id="yippee" src="https://www.myinstants.com/media/sounds/yippee-tbh.mp3"></audio>

    <script>
        const noBtn = document.getElementById('noBtn');

        function moveButton(e) {
            const maxX = window.innerWidth - noBtn.offsetWidth - 30;
            const maxY = window.innerHeight - noBtn.offsetHeight - 30;

            const newX = Math.max(30, Math.random() * maxX);
            const newY = Math.max(30, Math.random() * maxY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        function celebrate() {
            document.getElementById("yippee").play();
            document.getElementById("ask").style.display = "none";
            document.getElementById("noBtn").style.display = "none";
            document.getElementById("success").style.display = "block";
            
            const items = ['✨', '❤️', '💖', '🌸', '💋', '🫂'];
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.innerHTML = items[Math.floor(Math.random() * items.length)];
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.top = '100vh';
                    p.style.fontSize = (Math.random() * 20 + 20) + 'px';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 2500);
                }, i * 30);
            }
        }
    </script>
</body>
</html>
